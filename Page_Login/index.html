<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="fath">

        <div class="sing">
            <div class="head">
                <img src="/Source/Background.png" alt="logo" class="icon">
                <h2>Atlas Drive</h2>
            </div>
            <h1 class="hed">Create your account</h1>
            <p>join atlas drive for a premium car rental experience</p>
            <form action="/" class="info">
                <div class="dic">
    
                    <label for="name" class="labe">Full Name</label>
                    <input type="text" name="name" id="name" placeholder="your full name" class="inp" required>
                </div>
                <div class="dic">
    
                    <label for="mail" class="labe">Email Address</label>
                    <input type="email" name="mail" id="mail" placeholder="name@company.com" class="inp" required>
                </div>
                <div class="dic">
    
    
                    <label for="password" class="labe">Password</label>
                    <input type="password" name="password" id="password" placeholder=".........." class="inp" required>
                </div>
                <div class="dic fle">
                    <input type="checkbox" name="agree" id="agree">
                    <label for="agree">I agree to the <a href="">Terms of Services</a>  and <a href="">Privacy Policyi</a></label>
                </div>
                    
            </form>
            <button class="button" >Log-In</button>
            <span>or sign up with</span>
            <div class="con">
                <a href="https://www.google.com/" class="cons">
                    <button>
                        <img src="/Source/Google.PNG" alt="">  Google
                    </button>
                </a>
            </div>
            <div class="con">
                <a href="https://web.facebook.com/" class="cons">
                    <button>
                        <img src="/Source/facebook.png" alt="">  Facebook
                    </button>
                </a>
            </div>
            <p>Already have an account? <a href="">Sing in</a></p>
        </div>
    </div>
    <footer>&copy; 2024 Atlas Drive Inc. All rights reserved.</footer>
</body>
</html>
